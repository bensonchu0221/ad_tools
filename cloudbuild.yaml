# git push main → Cloud Build → 部署 Cloud Run（沿用平台慣例）
# 需先在 GCP 建好 Cloud Build trigger 監看 github.com/bensonchu0221/ad_tools 的 main 分支。
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-east1-docker.pkg.dev/popinpoc1/cloud-run-source-deploy/ad_tools:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-east1-docker.pkg.dev/popinpoc1/cloud-run-source-deploy/ad_tools:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ad-tools'
      - '--image=asia-east1-docker.pkg.dev/popinpoc1/cloud-run-source-deploy/ad_tools:$COMMIT_SHA'
      - '--region=asia-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'        # Chromium 較吃記憶體
      - '--cpu=2'
      - '--timeout=120'
      - '--no-cpu-throttling'
      - '--min-instances=1'   # 讓瀏覽器保溫
      # Google 登入保護（app 層）。Cloud Run 網路層仍 allow-unauthenticated，
      # 但 app 強制 Google OAuth + 在職員工名單（timeoff DB），比照 lunchbox/timeoff 模式。
      - '--add-cloudsql-instances=popinpoc1:asia-east1:internal-tool'
      # token 庫(新)：Cloud SQL ad_tools.d_tokens（socket）；OLDDB=舊 dctool DB(AWS)，唯讀鏡像來源
      - '--update-env-vars=GOOGLE_REDIRECT_URL=https://ad-tools-439393162392.asia-east1.run.app/auth/google/callback,ALLOWED_EMAIL_DOMAINS=popin.cc;broadciel.com,TIMEOFF_DB_SOCKET=/cloudsql/popinpoc1:asia-east1:internal-tool,TIMEOFF_DB_NAME=timeoff,TIMEOFF_DB_USER=popin,DB_SOCKET=/cloudsql/popinpoc1:asia-east1:internal-tool,DB_NAME=ad_tools,DB_USER=popin,OLDDB_HOST=13.231.111.229,OLDDB_PORT=3001,OLDDB_USER=dev,OLDDB_NAME=popin_tw_new'
      - '--update-secrets=GOOGLE_CLIENT_ID=ad-tools-google-client-id:latest,GOOGLE_CLIENT_SECRET=ad-tools-google-client-secret:latest,SESSION_SECRET=ad-tools-session-secret:latest,TIMEOFF_DB_PASSWORD=ad-tools-timeoff-db-password:latest,DB_PASSWORD=ad-tools-timeoff-db-password:latest,OLDDB_PASSWORD=ad-tools-dctool-db-password:latest'
      # 清掉早期遺留的無效 env
      - '--remove-env-vars=ALLOWED_EMAIL_DOMAIN'
      # R(rixbee) token（之後需要時走 Secret Manager）：
      # - '--update-secrets=RIXBEE_AGENCY_TOKEN=rixbee-agency-token:latest,RIXBEE_DIRECT_TOKEN=rixbee-direct-token:latest'

images:
  - 'asia-east1-docker.pkg.dev/popinpoc1/cloud-run-source-deploy/ad_tools:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
